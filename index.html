<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Carregador OCPP 1.6J</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; }
        .card { background: #2a2a2a; border-radius: 8px; padding: 20px; max-width: 600px; margin: auto; border: 1px solid #444; }
        input { width: 70%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: white; }
        button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .btn-conn { background: #007bff; color: white; }
        .btn-action { background: #28a745; color: white; }
        #log { background: #000; color: #00ff00; padding: 10px; height: 250px; overflow-y: auto; margin-top: 20px; font-family: monospace; font-size: 12px; border: 1px solid #444; }
        .status { margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Simulador de Carregador</h2>
    
    <div class="status">Status: <span id="connStatus" style="color: red;">Desconectado</span></div>

    <input type="text" id="wsUrl" placeholder="ws://://seu-backend.com" value="wss://echo.websocket.org">
    <button class="btn-conn" onclick="conectar()">Conectar</button>
    
    <hr style="border: 0.5px solid #444; margin: 20px 0;">

    <div>
        <button class="btn-action" onclick="enviarBoot()">BootNotification</button>
        <button class="btn-action" onclick="enviarStatus()">StatusNotification (Available)</button>
        <button class="btn-action" onclick="enviarStart()">StartTransaction</button>
        <button class="btn-action" onclick="enviarStop()">StopTransaction</button>
    </div>

    <div id="log"></div>
</div>

<script>
    let ws = null;
    const logDiv = document.getElementById('log');

    function log(msg, type) {
        const time = new Date().toLocaleTimeString();
        const color = type === 'sent' ? '#00ff00' : '#00bfff';
        logDiv.innerHTML += `<div style="color:${color}">[${time}] ${type.toUpperCase()}: ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function conectar() {
        const url = document.getElementById('wsUrl').value;
        // O sub-protocolo 'ocpp1.6' é obrigatório para a maioria dos backends
        ws = new WebSocket(url, ['ocpp1.6']);

        ws.onopen = () => {
            document.getElementById('connStatus').innerText = "Conectado";
            document.getElementById('connStatus').style.color = "lightgreen";
            log("Conexão estabelecida com o servidor.", "info");
        };

        ws.onmessage = (msg) => log(msg.data, "recebido");
        ws.onerror = (e) => log("Erro na conexão WebSocket", "erro");
        ws.onclose = () => {
            document.getElementById('connStatus').innerText = "Desconectado";
            document.getElementById('connStatus').style.color = "red";
        };
    }

    function send(action, payload) {
        if(!ws || ws.readyState !== WebSocket.OPEN) return alert("Conecte ao servidor primeiro!");
        
        // Estrutura Padrão OCPP: [MessageTypeId, MessageId, Action, Payload]
        const msgId = Math.random().toString(36).substr(2, 9);
        const call = JSON.stringify([2, msgId, action, payload]);
        
        ws.send(call);
        log(call, "sent");
    }

    // Comandos OCPP 1.6
    function enviarBoot() {
        send("BootNotification", { chargePointVendor: "MinhaMarca", chargePointModel: "Modelo-HTML" });
    }

    function enviarStatus() {
        send("StatusNotification", { connectorId: 1, errorCode: "NoError", status: "Available" });
    }

    function enviarStart() {
        send("StartTransaction", { connectorId: 1, idTag: "RFID-TESTE", meterStart: 0, timestamp: new Date().toISOString() });
    }

    function enviarStop() {
        send("StopTransaction", { meterStop: 1500, timestamp: new Date().toISOString(), transactionId: 1 });
    }
</script>

</body>
</html>
